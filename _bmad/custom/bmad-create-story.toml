[workflow]

persistent_facts = [
"""
This project has an automated test suite. When writing a story, keep the following in mind:

**Test suite layout:**
- `tests/js/yin.unit.test.js` — unit tests for the YIN pitch detection algorithm (`_yinDetect`):
  synthetic sine waves at each guitar string frequency, silence/sub-threshold rejection, confidence and rms checks.
- `tests/js/yin.wav.test.js` — WAV fixture integration tests: auto-discovers every
  `<Note><Octave>_<FreqHz>Hz.wav` file in `tests/fixtures/audio/` and asserts the detected
  frequency is within 2% of the filename value. Add new fixtures by dropping a WAV file there
  or running `python tests/fixtures/generate_audio.py`.
- `tests/python/test_config.py` — unit and HTTP tests for `_migrate_custom_tuning` and the
  config read/write/defaults logic in `routes.py`.
- `tests/python/test_routes.py` — HTTP endpoint tests: file-serving routes, path traversal
  guards, config POST/GET.
- Run JS tests:  node --test tests/js/yin.unit.test.js tests/js/yin.wav.test.js
- Run Python tests: pytest

**When to expand the tests:**
- Story touches YIN / pitch detection / audio accumulation logic → add or update unit tests
  in `yin.unit.test.js`; if the change could affect detection accuracy for real audio, add a
  WAV fixture and a corresponding entry in `yin.wav.test.js`.
- Story changes config schema, defaults, or migration logic in `routes.py` → add or update
  cases in `test_config.py`.
- Story adds or changes an API route, file-serving endpoint, or path-traversal guard → add
  or update cases in `test_routes.py`.
- Story is purely UI/visualization with no audio or backend changes → no test changes needed.

**Story authoring rules:**
- If the story is in scope for tests, include an explicit acceptance criterion:
  "All existing tests pass; new/modified tests added for the changed behaviour."
- Add a concrete dev task: "Expand test suite — <describe what to test>" so the implementing
  agent knows exactly what to cover.
""",
]

on_complete = """
Create a GitHub issue for the story file you just saved using the gh CLI.

Step 1 — Create the story issue:
- Title format: "<story_key>: <story title>" (e.g. "1-2: Implement YIN worker")
- Labels: always include "story"; add "enhancement" for new functionality or "bug" for bug fixes — infer from the story content
- Body: the story's user story statement ("As a… I want… So that…") followed by a bullet list of acceptance criteria
- Command: gh issue create --title "..." --label "story" --label "enhancement" --body "..."
- Capture the returned issue number (call it STORY_ISSUE_NUMBER)

Step 2 — Set parent epic issue:
- Search for the parent epic's GitHub issue: gh issue list --label "epic" --search "Epic <epic_num>:" --json number,title --jq '.[0].number'
- Capture the result as EPIC_ISSUE_NUMBER
- Get the epic's node ID: gh api graphql -f query='query{repository(owner:"OmikronApex",name:"slopsmith-plugin-tuner"){issue(number:<EPIC_ISSUE_NUMBER>){id}}}' -q .data.repository.issue.id
- Get the story's node ID: gh api graphql -f query='query{repository(owner:"OmikronApex",name:"slopsmith-plugin-tuner"){issue(number:<STORY_ISSUE_NUMBER>){id}}}' -q .data.repository.issue.id
- Link story as sub-issue (child) of the epic (parent) using GraphQL:
  gh api graphql -f query='mutation($p:ID!,$c:ID!){addSubIssue(input:{issueId:$p,subIssueId:$c}){issue{number}subIssue{number}}}' -f p="<EPIC_NODE_ID>" -f c="<STORY_NODE_ID>"
- If the mutation errors with "already has a parent", the link already exists — no action needed.
- If the mutation fails for any other reason, fall back to: gh issue comment <EPIC_ISSUE_NUMBER> --body "Sub-task: #<STORY_ISSUE_NUMBER>"

Report the story issue URL and whether the parent link succeeded.
"""
